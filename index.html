<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Development Environment Setup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;

        .btn-mac { background-color: #2ea44f; }

<div class="container">

    <div class="os-selection">
